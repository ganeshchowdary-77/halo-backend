spring.application.name=halo-backend


# ===============================
# H2 FILE-BASED DATABASE
# ===============================

spring.datasource.url=jdbc:h2:file:./data/halodb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=pass

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ===============================
# DATA SEEDING
# ===============================
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ===============================
# H2 CONSOLE
# ===============================

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JWT CONFIGURATION
# ===============================

# JWT Secret - should be set via JWT_SECRET environment variable in production
# Minimum 32 characters (256 bits) required
app.jwt.secret=${JWT_SECRET:dev-secret-key-should-be-at-least-32-characters-long}
# Access token expiration: 15 minutes (900000 ms)
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
# Refresh token expiration: 7 days (604800000 ms)
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ===============================
# ACTUATOR CONFIGURATION (Simple)
# ===============================

# Enable basic health endpoint for IAM Admin
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# ===============================
# GROQ AI CONFIGURATION
# ===============================

# API Key - Set this to your Groq api key
app.ai.api-key=${GROQ_API_KEY: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}
# llama3-70b-8192 was decommissioned March 2025. Use llama-3.3-70b-versatile (best for tool-calling)
app.ai.model=llama-3.3-70b-versatile
app.ai.base-url=https://api.groq.com/openai/v1
app.ai.temperature=0.2
app.ai.max-tokens=2048
